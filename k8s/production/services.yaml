---
# Ingestion API Service
apiVersion: v1
kind: Service
metadata:
  name: ingestion-api-service
  namespace: agrosolutions-ingestion
  labels:
    app: ingestion-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  selector:
    app: ingestion-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
