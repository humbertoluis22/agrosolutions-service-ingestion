# ⚠️ IMPORTANTE: Acesso Principal via Ocelot API Gateway
# Este Ingress é OPCIONAL e serve apenas para:
# - Acesso direto à API (debug/desenvolvimento)
# - Health checks externos
# - Testes de integração
#
# O acesso PÚBLICO à API deve ser feito via Ocelot Gateway em:
# - api.agrosolutions.com/ingestion/* → roteado para ingestion-api-service.agrosolutions-ingestion:80

---
# Ingestion API Ingress (Acesso Direto - Apenas Debug)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingestion-api-ingress
  namespace: agrosolutions-ingestion
  annotations:
    # AWS Load Balancer Controller
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    
    # Certificate Manager (para HTTPS)
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:sa-east-1:316295889438:certificate/YOUR-CERT-ARN"
    
    # Security & Logging
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=60,access_logs.s3.enabled=true,access_logs.s3.bucket=agrosolutions-alb-logs
spec:
  ingressClassName: alb
  rules:
    - host: ingestion-api.agrosolutions.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ingestion-api-service
                port:
                  number: 80
