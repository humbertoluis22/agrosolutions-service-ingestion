---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-api
  namespace: agrosolutions-ingestion
  labels:
    app: ingestion-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ingestion-api
  template:
    metadata:
      labels:
        app: ingestion-api
    spec:
      serviceAccountName: agrosolutions-ingestion-sa
      containers:
      - name: ingestion-api
        image: 316295889438.dkr.ecr.sa-east-1.amazonaws.com/agrosolutions-ingestion-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: ingestion-api-config
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
