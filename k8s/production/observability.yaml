---
# ServiceMonitor para Prometheus scraping da Ingestion API
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ingestion-api-monitor
  namespace: agrosolutions-ingestion
  labels:
    app: ingestion-api
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app: ingestion-api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

---
# PrometheusRule para alertas críticos
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ingestion-api-alerts
  namespace: agrosolutions-ingestion
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
  - name: ingestion-api
    interval: 30s
    rules:
    # Alerta: API está down
    # Alta latência de requisições
    - alert: IngestionAPIHighLatency
      expr: |
        histogram_quantile(0.95,
          sum(rate(http_server_duration_ms_bucket{service="agrosolutions-ingestion-api"}[5m])) by (le)
        ) > 1000
      for: 5m
      labels:
        severity: warning
        service: ingestion-api
      annotations:
        summary: "Alta latência detectada na Ingestion API"
        description: "P95 da latência está acima de 1000ms por mais de 5 minutos"

    # Taxa de erro alta
    - alert: IngestionAPIHighErrorRate
      expr: |
        sum(rate(http_server_requests_total{service="agrosolutions-ingestion-api",status=~"5.."}[5m]))
        /
        sum(rate(http_server_requests_total{service="agrosolutions-ingestion-api"}[5m]))
        > 0.05
      for: 5m
      labels:
        severity: critical
        service: ingestion-api
      annotations:
        summary: "Taxa de erro alta na Ingestion API"
        description: "Mais de 5% das requisições estão falhando por mais de 5 minutos"

    # Pod não ready
    - alert: IngestionAPIPodNotReady
      expr: |
        kube_pod_status_ready{namespace="agrosolutions-ingestion",pod=~"ingestion-api-.*",condition="true"} == 0
      for: 5m
      labels:
        severity: warning
        service: ingestion-api
      annotations:
        summary: "Pod da Ingestion API não está ready"
        description: "Pod {{ $labels.pod }} não está ready por mais de 5 minutos"

    # HPA maxed out
    - alert: IngestionAPIHPAMaxedOut
      expr: |
        kube_horizontalpodautoscaler_status_current_replicas{namespace="agrosolutions-ingestion"}
        >=
        kube_horizontalpodautoscaler_spec_max_replicas{namespace="agrosolutions-ingestion"}
      for: 15m
      labels:
        severity: warning
        service: ingestion-api
      annotations:
        summary: "HPA atingiu o máximo de réplicas"
        description: "HPA está no limite máximo há 15 minutos. Considere aumentar maxReplicas."

    # SNS publish errors
    - alert: IngestionAPISNSPublishErrors
      expr: |
        sum(rate(ingestion_sns_publish_errors_total[5m])) > 0.1
      for: 5m
      labels:
        severity: critical
        service: ingestion-api
      annotations:
        summary: "Erros ao publicar no SNS"
        description: "Alta taxa de erros ao publicar mensagens no SNS"
