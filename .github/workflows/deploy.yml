name: Deploy to EKS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: agrosolutions-ingestion-api
  EKS_CLUSTER_NAME: agrosolutions-eks-cluster

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore AgrosolutionsServiceIngestion.slnx
    
    - name: Build
      run: dotnet build AgrosolutionsServiceIngestion.slnx --configuration Release --no-restore
    
    - name: Test
      run: |
        if [ -d "tests" ]; then
          dotnet test AgrosolutionsServiceIngestion.slnx --configuration Release --no-build --verbosity normal
        else
          echo "No test projects found, skipping tests"
        fi

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
    
    - name: Create namespace if not exists
      run: |
        kubectl create namespace agrosolutions-ingestion --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Create AWS secrets
      run: |
        kubectl create secret generic ingestion-aws-secrets \
          --from-literal=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
          --from-literal=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
          --namespace agrosolutions-ingestion \
          --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/production/namespace.yaml
        kubectl apply -f k8s/production/configmaps.yaml
        kubectl apply -f k8s/production/deployment.yaml
        kubectl apply -f k8s/production/services.yaml
        kubectl apply -f k8s/production/hpa.yaml
        kubectl apply -f k8s/production/resource-configs.yaml
        
        # Apply observability if Prometheus Operator is installed
        kubectl apply -f k8s/production/observability.yaml --dry-run=client || true
    
    - name: Wait for rollout to complete
      run: |
        kubectl rollout status deployment/ingestion-api -n agrosolutions-ingestion --timeout=5m
    
    - name: Verify deployment
      run: |
        kubectl get deployments -n agrosolutions-ingestion
        kubectl get pods -n agrosolutions-ingestion
        kubectl get svc -n agrosolutions-ingestion
